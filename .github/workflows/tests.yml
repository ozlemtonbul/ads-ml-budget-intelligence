name: Automated Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python 3.13 Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # ======================================================
      # Google Ads test configuration
      # ======================================================

      GOOGLE_ADS_DEVELOPER_TOKEN: test-developer-token
      GOOGLE_ADS_CLIENT_ID: test-client-id
      GOOGLE_ADS_CLIENT_SECRET: test-client-secret
      GOOGLE_ADS_REFRESH_TOKEN: test-refresh-token
      GOOGLE_ADS_LOGIN_CUSTOMER_ID: "1234567890"
      GOOGLE_ADS_CUSTOMER_ID: "9876543210"

      # ======================================================
      # Google Analytics 4 test configuration
      # ======================================================

      GA4_PROPERTY_ID: "123456789"
      GA4_SERVICE_ACCOUNT_FILE: credentials/test-ga4-service-account.json

      # ======================================================
      # Date range
      # ======================================================

      DATE_MODE: custom
      DATE_FROM: "2026-01-01"
      DATE_TO: "2026-01-31"

      # ======================================================
      # Business target
      # ======================================================

      TARGET_ROAS: "3.0"

      # ======================================================
      # Multi-LLM test configuration
      # ======================================================

      LLM_ENABLED: "false"
      LLM_PROVIDER: anthropic
      LLM_MODEL: claude-sonnet-4-6
      LLM_LANGUAGE: en
      LLM_MAX_CAMPAIGNS: "20"
      LLM_MAX_TOKENS: "1200"
      LLM_TEMPERATURE: "0.2"

      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""

      # ======================================================
      # Output
      # ======================================================

      OUTPUT_DIR: ./outputs

      # ======================================================
      # PostgreSQL
      # ======================================================

      POSTGRES_ENABLED: "false"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ads_budget
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test-password
      POSTGRES_IF_EXISTS: replace

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Create required directories and test credentials
        shell: bash
        run: |
          mkdir -p credentials
          mkdir -p outputs
          mkdir -p logs
          printf '{}\n' > credentials/test-ga4-service-account.json

      - name: Validate application imports
        run: |
          python -c "import config.settings"
          python -c "import src.recommendations.recommendation_engine"
          python -c "import src.llm.manager"

      - name: Run automated tests
        run: python -m pytest tests -v --tb=short