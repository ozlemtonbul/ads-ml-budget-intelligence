services:
  postgres:
    image: postgres:16

    container_name: ads-budget-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ads_budget
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:

    build: .

    container_name: ads-budget-intelligence

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    volumes:
      - ./outputs:/app/outputs
      - ./credentials:/app/credentials

    command: python main.py

volumes:
  postgres_data: